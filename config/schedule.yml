# ============================================================
#  Agenda — weekly schedule configuration
#  Define your routine here. Blocks are grouped into reusable
#  day templates, then templates are assigned to weekdays.
# ============================================================

# Block categories: key -> { label, color }.
# `key` is referenced by each block's `category` field.
categories:
  routine: { label: Rotina, color: "#a3a3a3" }
  health: { label: Saúde, color: "#c084fc" }
  work: { label: Trabalho, color: "#60a5fa" }
  study: { label: Estudo, color: "#34d399" }
  meal: { label: Refeição, color: "#fbbf24" }
  leisure: { label: Lazer, color: "#f472b6" }
  sleep: { label: Sono, color: "#818cf8" }
  english: { label: Inglês, color: "#f472b6" }

# Reusable day templates.
# Block fields: start, end (HH:MM, 24h), title, category, note (optional).
# A block whose `end` is <= `start` crosses midnight (e.g. sleep).
templates:
  weekday:
    - { start: "04:00", end: "04:20", title: "Rotina matinal", category: routine, note: "Água · alongamento" }
    - { start: "04:23", end: "06:50", title: "Estudos", category: study }
    - { start: "06:50", end: "07:10", title: "Inglês", category: english }
    - { start: "07:13", end: "07:40", title: "Café & banho", category: meal }
    - { start: "08:00", end: "11:00", title: "Trabalho", category: work }
    - { start: "11:00", end: "13:00", title: "Almoço", category: meal }
    - { start: "13:00", end: "18:00", title: "Trabalho", category: work }
    - { start: "18:00", end: "19:00", title: "Jantar", category: meal }
    - { start: "19:00", end: "20:30", title: "Estudo", category: study }
    - { start: "20:30", end: "21:00", title: "Lazer", category: leisure }
    - { start: "21:00", end: "21:45", title: "Leitura", category: study }
    - { start: "21:45", end: "22:00", title: "Higiêne + dia seguinte", category: routine }
    - { start: "22:08", end: "04:00", title: "Sono", category: sleep }

  saturday:
    - { start: "08:00", end: "08:45", title: "Acordar & rotina", category: routine }
    - { start: "08:45", end: "10:00", title: "Exercício longo", category: health }
    - { start: "10:00", end: "11:00", title: "Café da manhã", category: meal }
    - { start: "11:00", end: "13:00", title: "Projetos pessoais", category: study }
    - { start: "13:00", end: "14:00", title: "Almoço", category: meal }
    - { start: "14:00", end: "18:00", title: "Lazer / social", category: leisure }
    - { start: "18:00", end: "19:00", title: "Tarefas de casa", category: routine }
    - { start: "19:00", end: "20:00", title: "Jantar", category: meal }
    - { start: "20:00", end: "23:00", title: "Lazer", category: leisure }
    - { start: "23:00", end: "08:00", title: "Sono", category: sleep }

  sunday:
    - { start: "08:30", end: "09:30", title: "Acordar devagar", category: routine }
    - { start: "09:30", end: "10:30", title: "Exercício leve", category: health }
    - { start: "10:30", end: "11:30", title: "Café da manhã", category: meal }
    - { start: "11:30", end: "13:00", title: "Revisão & planejar semana", category: study }
    - { start: "13:00", end: "14:00", title: "Almoço", category: meal }
    - { start: "14:00", end: "17:00", title: "Descanso / lazer", category: leisure }
    - { start: "17:00", end: "18:30", title: "Preparar a semana", category: routine }
    - { start: "18:30", end: "19:30", title: "Jantar", category: meal }
    - { start: "19:30", end: "22:00", title: "Lazer", category: leisure }
    - { start: "22:00", end: "06:30", title: "Sono", category: sleep }

# Assign a template to each weekday. 0 = Sunday ... 6 = Saturday.
week:
  0: sunday
  1: weekday
  2: weekday
  3: weekday
  4: weekday
  5: weekday
  6: saturday

# Daily habits checklist (state saved per day in localStorage).
habits:
  - { id: agua, label: "Beber 2L de água" }
  - { id: exercicio, label: "Exercitar-se" }
  - { id: leitura, label: "Ler 20 min" }
  - { id: meditar, label: "Meditar" }
  - { id: estudo, label: "Estudar" }
  - { id: planejar, label: "Planejar o dia" }
